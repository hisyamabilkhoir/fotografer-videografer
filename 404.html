<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Halaman Tidak Ditemukan | ABYNSS STUDIO</title>
  <meta name="description" content="Halaman yang Anda cari tidak ditemukan.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect fill='%230D0D0D' width='32' height='32' rx='8'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='%23C7A66A' font-family='serif' font-size='18' font-weight='bold'%3EA%3C/text%3E%3C/svg%3E">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', sans-serif; background: #0D0D0D; color: #F5F5F5;
      overflow: hidden; position: relative;
    }
    /* Noise overlay */
    body::after {
      content: ''; position: fixed; inset: -50%; width: 200%; height: 200%;
      background: transparent url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E") repeat;
      pointer-events: none; z-index: 9999; opacity: 0.03;
    }
    .container {
      text-align: center; padding: 2rem; position: relative; z-index: 1;
    }
    .error-code {
      font-family: 'Playfair Display', serif; font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 700; line-height: 1; color: transparent;
      background: linear-gradient(135deg, #C7A66A, #8A6B3F);
      -webkit-background-clip: text; background-clip: text;
      margin-bottom: 1rem; opacity: 0;
      animation: fadeInUp 0.8s 0.2s forwards;
    }
    .error-title {
      font-family: 'Playfair Display', serif; font-size: clamp(1.5rem, 3vw, 2.5rem);
      font-weight: 600; margin-bottom: 1rem; opacity: 0;
      animation: fadeInUp 0.8s 0.4s forwards;
    }
    .error-desc {
      font-size: clamp(0.875rem, 1.5vw, 1.125rem); color: #999;
      max-width: 500px; margin: 0 auto 2.5rem; line-height: 1.6; opacity: 0;
      animation: fadeInUp 0.8s 0.6s forwards;
    }
    .error-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 1rem 2rem; background: linear-gradient(135deg, #C7A66A, #8A6B3F);
      color: #0D0D0D; font-weight: 600; font-size: 0.875rem;
      letter-spacing: 0.05em; text-transform: uppercase; text-decoration: none;
      border-radius: 9999px; transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
      opacity: 0; animation: fadeInUp 0.8s 0.8s forwards;
    }
    .error-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 40px rgba(199,166,106,0.25);
    }
    .bg-circles {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
    }
    .bg-circle {
      position: absolute; border-radius: 50%;
      background: radial-gradient(circle, rgba(199,166,106,0.06) 0%, transparent 70%);
      animation: float 8s ease-in-out infinite;
    }
    .bg-circle:nth-child(1) { width: 400px; height: 400px; top: 10%; left: 10%; animation-delay: 0s; }
    .bg-circle:nth-child(2) { width: 300px; height: 300px; top: 60%; right: 10%; animation-delay: 2s; }
    .bg-circle:nth-child(3) { width: 200px; height: 200px; bottom: 10%; left: 40%; animation-delay: 4s; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-30px); }
    }
  </style>
</head>
<body>
  <div class="bg-circles">
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
  </div>
  <div class="container">
    <div class="error-code">404</div>
    <h1 class="error-title">Halaman Tidak Ditemukan</h1>
    <p class="error-desc">Maaf, halaman yang Anda cari mungkin telah dipindahkan, dihapus, atau tidak pernah ada. Mari kembali ke beranda.</p>
    <a href="./" class="error-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Kembali ke Beranda
    </a>
  </div>
</body>
</html>
